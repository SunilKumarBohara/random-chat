<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ChatRoom — Live Chat</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root {
      --primary: #8b5cf6;
      --primary-dark: #7c3aed;
      --secondary: #ec4899;
      --accent: #10b981;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #2a2a2a;
      --text: #ffffff;
      --muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.1);
      --message-other: #2a2a2a;
      --input-bg: #2a2a2a;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    [data-theme="light"] {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface2: #f1f3f5;
      --text: #1a1a1a;
      --muted: #6c757d;
      --border: rgba(0, 0, 0, 0.1);
      --message-other: #e9ecef;
      --input-bg: #ffffff;
    }

    [data-theme="midnight"] {
      --bg: #0a0e27;
      --surface: #151932;
      --surface2: #1e2144;
      --text: #e0e7ff;
      --muted: #818cf8;
      --border: rgba(99, 102, 241, 0.2);
      --message-other: #1e2144;
      --input-bg: #1e2144;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
      position: relative;
    }

    .chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      position: relative;
      min-width: 0;
      transition: background-color 0.3s ease;
    }

    /* Header */
    .header {
      background: var(--surface);
      backdrop-filter: blur(10px);
      padding: 0 20px 0 0; /* Remove top/bottom padding to let menu-btn fill area */
      height: 60px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.3s ease, border-color 0.3s ease;
      z-index: 1000;
    }

    .partner-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1;
      padding-left: 5px;
    }

    .partner-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .premium-badge {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      color: white;
    }

    .partner-details {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .partner-gender {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(102, 126, 234, 0.2);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .partner-location {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }



    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header-btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: var(--surface2);
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-btn:hover {
      background: var(--surface);
      transform: translateY(-1px);
    }

    .header-btn.next {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: white;
    }

    .header-btn.report {
      color: #ef4444;
    }

    .header-btn.block {
      color: #f59e0b;
    }

    .header-btn.premium {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border: none;
      color: white;
    }

    /* Messages Area */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .messages-area::-webkit-scrollbar {
      width: 4px;
    }

    .messages-area::-webkit-scrollbar-track {
      background: var(--surface2);
    }

    .messages-area::-webkit-scrollbar-thumb {
      background: var(--muted);
      border-radius: 10px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      animation: fadeInUp 0.3s ease;
      word-wrap: break-word;
      content-visibility: auto;
      contain-intrinsic-size: 48px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.me {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.them {
      align-self: flex-start;
      background: var(--message-other);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message.system {
      align-self: center;
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 20px;
      max-width: 85%;
    }


    .typing-indicator {
      padding: 8px 20px;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      height: 36px;
    }

    /* Input Area */
    .input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .input-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .input-btn:hover {
      background: var(--surface);
    }

    .message-input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      border-radius: 24px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      min-width: 0;
      transition: all 0.3s;
    }

    .message-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .send-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    /* Reply UI */
    .reply-preview {
      display: none;
      background: var(--surface2);
      padding: 8px 16px;
      border-left: 4px solid var(--primary);
      margin: 0 16px;
      border-radius: 12px 12px 0 0;
      font-size: 12px;
      position: relative;
      animation: slideUp 0.3s ease;
      z-index: 10;
    }

    .reply-preview.show {
      display: block;
    }

    .reply-preview-content {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 24px;
    }

    .reply-preview-title {
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 2px;
    }

    .close-reply {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
    }
    .message-reply-quote {
      background: rgba(0, 0, 0, 0.2);
      padding: 6px 10px;
      border-left: 3px solid var(--primary);
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      opacity: 0.8;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message.me .message-reply-quote {
      background: rgba(255, 255, 255, 0.1);
      border-left-color: rgba(255, 255, 255, 0.5);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message {
      cursor: pointer; /* To indicate reply functionality */
    }

    /* Overlays */

    /* Overlays */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .overlay.show {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(102, 126, 234, 0.3);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .matching-title {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }

    .matching-subtitle {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .cancel-btn {
      padding: 10px 28px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }

    .cancel-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Mode Indicator */
    .mode-indicator {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      z-index: 50;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translate(-50%, -20px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }


    /* Premium Modal */
    .premium-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .premium-modal.show {
      display: flex;
    }

    .premium-card {
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border-radius: 24px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 1px solid #f59e0b;
    }

    .premium-title {
      font-size: 28px;
      font-weight: 800;
      color: #f59e0b;
      margin-bottom: 16px;
    }

    .premium-price {
      font-size: 36px;
      font-weight: 800;
      color: white;
      margin: 20px 0;
    }

    .premium-price small {
      font-size: 14px;
      color: #9ca3af;
    }

    .premium-options {
      display: flex;
      gap: 16px;
      margin: 24px 0;
    }

    .premium-option {
      flex: 1;
      padding: 16px;
      background: #0f0f0f;
      border-radius: 16px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .premium-option.selected {
      border-color: #f59e0b;
      background: rgba(245, 158, 11, 0.1);
    }

    .premium-option-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .premium-option-title {
      font-weight: 700;
      color: white;
    }

    .premium-pay-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }

    .premium-pay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
    }

    .premium-close {
      margin-top: 16px;
      color: #9ca3af;
      cursor: pointer;
      transition: color 0.3s;
    }

    .premium-close:hover {
      color: white;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .video-section {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        z-index: 200;
      }

      .video-section:not(.active) {
        transform: translateX(100%);
      }

      .video-section.active {
        transform: translateX(0);
      }

      .message {
        max-width: 85%;
      }

      .header-actions .header-btn span {
        display: none;
      }

      .header-btn {
        padding: 8px 12px;
        min-width: 44px;
        min-height: 44px;
      }

      .premium-card {
        padding: 24px;
        margin: 20px;
      }

      .call-controls {
        gap: 10px;
        padding: 12px;
      }

    }

    @media (max-width: 480px) {
      .header {
        padding: 10px 12px;
      }

      .input-area {
        padding: 10px 12px;
        position: sticky;
        bottom: 0;
        background: var(--surface);
        z-index: 50;
      }

      .messages-area {
        padding: 12px;
      }

      .recording-ui {
        padding: 10px 16px;
        bottom: 70px;
      }

      .call-btn {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }

      .input-btn,
      .send-btn {
        min-width: 44px;
        min-height: 44px;
      }


      .chat-main {
        padding-bottom: 72px;
      }
    }

    /* Loading toast */
    #loadingToast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 12px;
      z-index: 500;
      display: none;
      max-width: min(520px, calc(100vw - 24px));
      text-align: center;
    }

    #loadingToast.show {
      display: block;
    }

    .btn-disabled {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="loadingToast">Loading…</div>
  <div class="app-container">
    <!-- Chat Section -->
    <div class="chat-section">
      <div class="header">
        <button class="menu-btn" onclick="window.ChatroomTheme?.toggleMenu?.(event)">
          <i class="fas fa-bars"></i>
        </button>
        <div class="partner-info">
          <div class="partner-name">
            <span id="partnerName">Finding partner...</span>
            <span id="premiumBadge" class="premium-badge" style="display: none;">⭐ PREMIUM</span>
          </div>
          <div class="partner-details" id="partnerDetails" style="display: none;">
            <span class="partner-gender" id="partnerGenderDisplay"><i class="fas fa-user"></i>
              <span>Unknown</span></span>
            <span class="partner-location" id="partnerLocationDisplay"><i class="fas fa-map-marker-alt"></i>
              <span>Unknown</span></span>
            <div class="status-badge">
              <span id="statusText">Connected</span>
            </div>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn premium" id="premiumBtn" onclick="openPremiumModal()"><i class="fas fa-crown"></i>
            <span>Premium</span></button>
          <button class="header-btn block" id="blockBtn" style="display: none;" onclick="blockPartner()"><i
              class="fas fa-ban"></i> <span>Block</span></button>
          <button class="header-btn report" id="reportBtn" style="display: none;" onclick="reportPartner()"><i
              class="fas fa-flag"></i> <span>Report</span></button>
          <button class="header-btn next" onclick="nextPartner()"><i class="fas fa-forward"></i>
            <span>Next</span></button>
        </div>
      </div>

      <div class="messages-area" id="messagesArea"></div>
      <div class="typing-indicator" id="typingIndicator"></div>

      <!-- Reply Preview -->
      <div class="reply-preview" id="replyPreview">
        <div class="reply-preview-title" id="replyTitle">Replying to Stranger</div>
        <div class="reply-preview-content" id="replyContent">Message content...</div>
        <div class="close-reply" onclick="cancelReply()"><i class="fas fa-times"></i></div>
      </div>

      <div class="input-area">
        <button class="input-btn" onclick="document.getElementById('photoInput').click()"><i
            class="fas fa-image"></i></button>
        <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="sendPhoto(this)">
        <input type="text" class="message-input" id="messageInput" placeholder="Type a message..."
          onkeypress="handleKeyPress(event)" oninput="handleTyping()">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
      </div>

      <!-- Matching Overlay -->
      <div class="overlay" id="matchingOverlay">
        <div class="matching-animation">
          <div class="spinner"></div>
          <h2 class="matching-title">Finding a match...</h2>
          <p class="matching-subtitle" id="matchStatus">Searching for someone to chat with</p>
          <button class="cancel-btn" onclick="cancelMatching()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Premium Modal -->

    <!-- Premium Modal -->
    <div class="premium-modal" id="premiumModal">
      <div class="premium-card">
        <div class="premium-title"><i class="fas fa-crown"></i> Premium Access</div>
        <div class="premium-price">₹100 <small>/15 minutes</small></div>
        <p style="color: var(--muted); margin-bottom: 20px;">Chat with your preferred gender!</p>
        <div class="premium-options">
          <div class="premium-option" onclick="selectPremiumFilter('male')" id="premiumMaleOption">
            <div class="premium-option-icon">👨</div>
            <div class="premium-option-title">Only Men</div>
          </div>
          <div class="premium-option" onclick="selectPremiumFilter('female')" id="premiumFemaleOption">
            <div class="premium-option-icon">👩</div>
            <div class="premium-option-title">Only Women</div>
          </div>
        </div>
        <button class="premium-pay-btn" onclick="activatePremium()"><i class="fas fa-rupee-sign"></i> Pay ₹100 &
          Start</button>
        <div class="premium-close" onclick="closePremiumModal()">Maybe later</div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="theme.js"></script>
  <script>
    // Get setup data from session storage
    const setup = JSON.parse(sessionStorage.getItem('chatSetup') || '{}');
    if (!setup.nickname) {
      window.location.href = '/';
    }

    // Socket connection (manual reconnect/backoff)
    const socket = io({
      autoConnect: false,
      reconnection: false
    });

    let partnerId = null;
    let isConnected = false;
    let currentPartner = null;
    let isPremium = false;
    let premiumFilter = null;
    let premiumTimer = null;
    let premiumEndTime = null;
    let anonymousId = setup.anonymousId || null;


    // Connection state + outgoing queue

    // Connection state + outgoing queue
    let connectionState = 'connecting'; // 'connecting' | 'connected' | 'disconnected'
    let reconnectAttempt = 0;
    let reconnectTimer = null;

    const outboundQueue = []; // { event, payload, ts }
    const MAX_QUEUE = 200;

    // Heartbeat (app-level ping/pong every 25s)
    let heartbeatTimer = null;
    let lastPongAt = 0;
    let remoteTypingClearTimer = null;
    let memoryHighSince = null;
    let memoryMonitorTimer = null;

    function setConnectionState(state) {
      connectionState = state;

      const statusText = document.getElementById('statusText');
      const statusDot = document.getElementById('statusDot');
      if (!statusText || !statusDot) return;

      if (state === 'connected') {
        statusText.textContent = '🟢 Connected';
      } else if (state === 'connecting') {
        statusText.textContent = '🟡 Connecting...';
      } else {
        statusText.textContent = '🔴 Disconnected';
      }
    }

    function showReconnectingMessage() {
      addSystemMessage('Lost connection. Reconnecting...');
      setLoading(true, 'Reconnecting... ⏳');
    }

    function backoffDelayMs(attempt) {
      return Math.min(32000, 1000 * Math.pow(2, attempt));
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      setConnectionState('connecting');
      showReconnectingMessage();

      const delay = backoffDelayMs(reconnectAttempt);
      reconnectAttempt = Math.min(reconnectAttempt + 1, 5);

      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        if (!socket.connected) socket.connect();
      }, delay);
    }

    function safeEmit(event, payload) {
      if (socket.connected) {
        setLoading(false);
        socket.emit(event, payload);
        return true;
      }

      outboundQueue.push({ event, payload, ts: Date.now() });
      if (outboundQueue.length > MAX_QUEUE) outboundQueue.shift();
      return false;
    }

    function flushQueue() {
      while (socket.connected && outboundQueue.length) {
        const item = outboundQueue.shift();
        socket.emit(item.event, item.payload);
      }
      if (socket.connected) setLoading(false);
    }

    function startHeartbeat() {
      stopHeartbeat();
      lastPongAt = Date.now();

      heartbeatTimer = setInterval(() => {
        if (!socket.connected) return;

        if (Date.now() - lastPongAt > 55000) {
          setConnectionState('disconnected');
          try { socket.disconnect(); } catch (_) {}
          scheduleReconnect();
          return;
        }

        socket.emit('app-ping', { ts: Date.now() });
      }, 25000);
    }

    function stopHeartbeat() {
      if (heartbeatTimer) clearInterval(heartbeatTimer);
      heartbeatTimer = null;
    }


    // Loading state helpers
    let loadingCount = 0;
    function setLoading(isLoading, message = 'Loading…') {
      loadingCount = Math.max(0, loadingCount + (isLoading ? 1 : -1));
      const toast = document.getElementById('loadingToast');
      if (!toast) return;
      if (loadingCount > 0) {
        toast.textContent = message;
        toast.classList.add('show');
      } else {
        toast.classList.remove('show');
      }
    }



    // Message persistence (last 50 in localStorage)
    let messageHistory = [];
    const MAX_MESSAGE_HISTORY = 100;
    const MESSAGE_HISTORY_KEY = 'stranger_talk_message_history_v1';

    // Outbound message tracking (queue + retries + status)
    const pendingMessages = new Map(); // id -> { id, text, attempts, nextRetryAt, status }
    const MESSAGE_RETRY_ATTEMPTS = 5;
    const MESSAGE_RETRY_GAP_MS = 2000;
    const MESSAGE_DB_NAME = 'stranger_talk_messages_db_v1';
    const MESSAGE_DB_STORE = 'messages';
    let messageDb = null;

    function newMessageId() {
      return 'm_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
    }


    function setMessageStatus(id, status) {
      const rec = pendingMessages.get(id);
      if (rec) rec.status = status;
    }

    function enqueuePendingMessage(record) {
      pendingMessages.set(record.id, record);
    }

    function trySendPendingMessage(id) {
      const rec = pendingMessages.get(id);
      if (!rec) return;

      // If disconnected, keep as "sending" but don't burn attempts.
      if (!socket.connected) {
        rec.nextRetryAt = Date.now() + MESSAGE_RETRY_GAP_MS;
        return;
      }

      if (rec.attempts >= MESSAGE_RETRY_ATTEMPTS) {
        addSystemMessage('Could not send that message. Please try again.');
        return;
      }

      rec.attempts += 1;
      setMessageStatus(id, 'sending');

      socket.emit('message', { id: rec.id, text: rec.text }, (ack) => {
        if (ack && ack.ok) {
          setMessageStatus(id, 'sent'); // ✓✓
          // Wait for delivered receipt for ✓✓✓
          return;
        }

        // Schedule retry
        rec.nextRetryAt = Date.now() + MESSAGE_RETRY_GAP_MS;
        setTimeout(() => trySendPendingMessage(id), MESSAGE_RETRY_GAP_MS);
      });
    }

    function flushPendingMessages() {
      const now = Date.now();
      for (const [id, rec] of pendingMessages.entries()) {
        if (rec.status === 'read') {
          pendingMessages.delete(id);
          continue;
        }
        if (!rec.nextRetryAt || rec.nextRetryAt <= now) {
          trySendPendingMessage(id);
        }
      }
    }

    async function initMessageDb() {
      if (!window.indexedDB) return null;
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(MESSAGE_DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(MESSAGE_DB_STORE)) {
            db.createObjectStore(MESSAGE_DB_STORE, { keyPath: 'id' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function saveMessageToIndexedDb(msg) {
      try {
        if (!messageDb) return;
        const tx = messageDb.transaction(MESSAGE_DB_STORE, 'readwrite');
        tx.objectStore(MESSAGE_DB_STORE).put(msg);
      } catch (e) {
        console.warn('Failed to save message to IndexedDB:', e);
      }
    }

    async function loadMessagesFromIndexedDb() {
      try {
        if (!messageDb) return [];
        return await new Promise((resolve) => {
          const tx = messageDb.transaction(MESSAGE_DB_STORE, 'readonly');
          const req = tx.objectStore(MESSAGE_DB_STORE).getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => resolve([]);
        });
      } catch (_) {
        return [];
      }
    }

    // Show mode indicator

    // Show mode indicator
    function showModeIndicator() {
      const indicator = document.createElement('div');
      indicator.className = 'mode-indicator';
      indicator.innerHTML = `<i class="fas fa-comment"></i> Text Chat Mode`;
      document.body.appendChild(indicator);
      setTimeout(() => indicator.remove(), 3000);
    }

    // Socket event listeners
    socket.on('connect', () => {
      console.log('Connected to server');
      // #region agent log
      fetch('http://127.0.0.1:7492/ingest/24e09bd6-3c32-4e5f-9e1e-7c76fd711487',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'035750'},body:JSON.stringify({sessionId:'035750',runId:'chat-run',hypothesisId:'H3',location:'frontend/chat.html:1839',message:'Chat socket connected',data:{socketConnected:socket.connected,reconnectAttempt},timestamp:Date.now()})}).catch(()=>{});
      // #endregion
      reconnectAttempt = 0;
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      setConnectionState('connected');
      startHeartbeat();
      flushQueue();
      flushPendingMessages();
      setLoading(false);
      if (!isConnected && !partnerId) {
        startMatching();
      }
    });

    socket.on('disconnect', (reason) => {
      console.warn('Socket disconnected:', reason);
      setConnectionState('disconnected');
      stopHeartbeat();
      scheduleReconnect();
    });

    socket.on('connect_error', (err) => {
      console.warn('Socket connect_error:', err?.message || err);
      // #region agent log
      fetch('http://127.0.0.1:7492/ingest/24e09bd6-3c32-4e5f-9e1e-7c76fd711487',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'035750'},body:JSON.stringify({sessionId:'035750',runId:'chat-run',hypothesisId:'H3',location:'frontend/chat.html:1863',message:'Socket connect_error',data:{error:err?.message||String(err),state:connectionState},timestamp:Date.now()})}).catch(()=>{});
      // #endregion
      setConnectionState('disconnected');
      stopHeartbeat();
      scheduleReconnect();
    });

    socket.on('app-pong', () => {
      lastPongAt = Date.now();
    });

    socket.on('session', (data) => {
      anonymousId = data.anonymousId;
      localStorage.setItem('anonymousId', anonymousId); // Save for theme.js menu
      console.log('Session established:', anonymousId);
    });

    socket.on('online-count', (count) => {
      // Update online count if needed
      console.log('Online users:', count);
    });

    socket.on('waiting', (data) => {
      document.getElementById('matchStatus').textContent =
        `In text queue... ${data.queueLength} ${data.queueLength === 1 ? 'person' : 'people'} waiting`;
    });

    socket.on('matched', (data) => {
      partnerId = data.partnerId;
      currentPartner = data;
      isConnected = true;

      // Hide matching overlay
      document.getElementById('matchingOverlay').classList.remove('show');

      // Update partner info
      document.getElementById('partnerName').textContent = data.partnerNickname;

      // Show premium badge if partner is premium
      if (data.isPremium) {
        document.getElementById('premiumBadge').style.display = 'inline-block';
      } else {
        document.getElementById('premiumBadge').style.display = 'none';
      }

      // Update gender with icon
      const genderIcon = data.partnerGender === 'male' ? 'fa-mars' : (data.partnerGender === 'female' ? 'fa-venus' : 'fa-genderless');
      document.getElementById('partnerGenderDisplay').innerHTML = `<i class="fas ${genderIcon}"></i> <span>${data.partnerGender || 'Unknown'}</span>`;

      // Update location
      document.getElementById('partnerLocationDisplay').innerHTML = `<i class="fas fa-map-marker-alt"></i> <span>${data.partnerCountry?.name || 'Unknown'}</span>`;

      // Show partner details
      document.getElementById('partnerDetails').style.display = 'flex';
      document.getElementById('statusText').textContent = 'Connected';
      setConnectionState('connected');
      document.getElementById('statusDot').classList.add('online');

      document.getElementById('blockBtn').style.display = 'flex';
      document.getElementById('reportBtn').style.display = 'flex';

      // Add system message
      addSystemMessage(`✨ Matched with ${data.partnerNickname} ✨`);

      // Save to session storage
      sessionStorage.setItem('currentPartner', JSON.stringify(currentPartner));
    });

    socket.on('partner-left', (data) => {
      isConnected = false;
      partnerId = null;

      const reason = data?.reason || 'disconnected';
      const messages = {
        'next': '👋 Partner moved to next chat',
        'blocked': '🚫 You have been blocked',
        'reported': '⚠️ You have been reported',
        'disconnected': '👋 Partner has left the chat'
      };

      addSystemMessage(messages[reason] || messages.disconnected);

      document.getElementById('blockBtn').style.display = 'none';
      document.getElementById('reportBtn').style.display = 'none';

      // Reset UI
      document.getElementById('partnerName').textContent = 'Finding partner...';
      document.getElementById('partnerDetails').style.display = 'none';
      document.getElementById('statusText').textContent = 'Disconnected';
      document.getElementById('statusDot').classList.remove('online');


      // Clear session storage
      sessionStorage.removeItem('currentPartner');

      // Find new match after delay
      setTimeout(() => {
        if (!isConnected) {
          startMatching();
        }
      }, 1500);
    });

    socket.on('disconnected-next', () => {
      startMatching();
    });

    // Messaging events
    socket.on('message', (data) => {
      addMessage(data.text, 'them', { id: data.id, reply: data.reply });
      saveMessageToHistory({ type: 'text', content: data.text, sender: 'them', timestamp: data.timestamp, reply: data.reply });
      saveMessageToIndexedDb({ id: data.id || newMessageId(), ...data, type: 'text', sender: 'them' });

      // Immediately acknowledge receipt to enable "delivered" status for sender.
      if (data?.id && data?.from) {
        if (socket.connected) socket.emit('message-received', { id: data.id, from: data.from });
        setTimeout(() => {
          if (socket.connected) socket.emit('message-read', { id: data.id, from: data.from });
        }, 800);
      }
    });

    socket.on('message-delivered', (data) => {
      if (!data?.id) return;
      setMessageStatus(data.id, 'delivered');
    });

    socket.on('message-read', (data) => {
      if (!data?.id) return;
      setMessageStatus(data.id, 'read');
      pendingMessages.delete(data.id);
    });

    socket.on('typing', () => {
      document.getElementById('typingIndicator').textContent = '✏️ Stranger is typing...';
      if (remoteTypingClearTimer) clearTimeout(remoteTypingClearTimer);
      remoteTypingClearTimer = setTimeout(() => {
        const el = document.getElementById('typingIndicator');
        if (el) el.textContent = '';
      }, 2000);
    });

    socket.on('typing-stop', () => {
      document.getElementById('typingIndicator').textContent = '';
    });

    socket.on('photo', (data) => {
      addImageMessage(data.dataUrl, 'them');
      saveMessageToHistory({ type: 'image', content: data.dataUrl, sender: 'them', timestamp: data.timestamp });
    });



    // Message history management
    function saveMessageToHistory(message) {
      messageHistory.push(message);
      if (messageHistory.length > MAX_MESSAGE_HISTORY) {
        messageHistory.shift();
      }
      localStorage.setItem(MESSAGE_HISTORY_KEY, JSON.stringify(messageHistory));
      saveMessageToIndexedDb({ id: message.id || newMessageId(), ...message });
    }

    function loadMessageHistory() {
      try {
        const saved = localStorage.getItem(MESSAGE_HISTORY_KEY);
        if (saved) {
          messageHistory = JSON.parse(saved);
        }
      } catch (e) {
        console.error('Failed to load local message history:', e);
      }

      const recent = messageHistory.slice(-100);
      recent.forEach(msg => {
        if (msg.type === 'text') addMessage(msg.content, msg.sender, { id: msg.id, reply: msg.reply });
        else if (msg.type === 'image') addImageMessage(msg.content, msg.sender);
        else if (msg.type === 'voice') addVoiceMessage(msg.content, msg.duration, msg.sender);
      });
    }

    // Matching functions
    function startMatching() {
      isConnected = false;
      partnerId = null;
      document.getElementById('messagesArea').innerHTML = '';
      messageHistory = [];
      document.getElementById('matchingOverlay').classList.add('show');

      document.getElementById('matchStatus').textContent = `Searching for chat partner...`;

      safeEmit('find-match', {
        nickname: setup.nickname,
        gender: setup.gender,
        pref: setup.pref,
        age: setup.age,
        interests: [],
        mode: 'text',
        country: setup.country || null,
        anonymousId: anonymousId
      });
    }

    function cancelMatching() {
      safeEmit('cancel-match');
      window.location.href = '/';
    }

    // Message functions
    // Reply state
    let replyingTo = null;

    window.setReplyTo = function(msgId, text, isMe) {
      if (!isConnected) return;
      replyingTo = { id: msgId, text: text };
      const preview = document.getElementById('replyPreview');
      const content = document.getElementById('replyContent');
      const title = document.getElementById('replyTitle');
      
      title.textContent = isMe ? 'Replying to Yourself' : 'Replying to Stranger';
      content.textContent = text;
      preview.classList.add('show');
      document.getElementById('messageInput').focus();
    };

    window.cancelReply = function() {
      replyingTo = null;
      document.getElementById('replyPreview').classList.remove('show');
    };

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !isConnected) return;

      const id = newMessageId();
      const replyData = replyingTo ? { ...replyingTo } : null;
      
      addMessage(text, 'me', { id, status: 'sending', reply: replyData });
      saveMessageToHistory({ 
        id, 
        type: 'text', 
        content: text, 
        sender: 'me', 
        timestamp: Date.now(), 
        status: 'sending',
        reply: replyData
      });

      input.value = '';
      enqueuePendingMessage({ 
        id, 
        text, 
        attempts: 0, 
        nextRetryAt: Date.now(), 
        status: 'sending',
        reply: replyData
      });
      
      socket.emit('message', { id, text, reply: replyData }, (ack) => {
        if (ack && ack.ok) {
          setMessageStatus(id, 'sent');
        } else {
          trySendPendingMessage(id);
        }
      });

      cancelReply();
      if (socket.connected) socket.emit('typing-stop');
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    let typingTimeout;
    let typingDebounceTimer;
    let typingStopTimer;
    function handleTyping() {
      if (!isConnected) return;

      // 400ms debounce: only emit "typing" after user has been typing briefly
      clearTimeout(typingDebounceTimer);
      typingDebounceTimer = setTimeout(() => {
        if (socket.connected) socket.emit('typing');
      }, 400);

      // Stop typing 2s after last input
      clearTimeout(typingStopTimer);
      typingStopTimer = setTimeout(() => {
        if (socket.connected) socket.emit('typing-stop');
      }, 2000);
    }

    function sendPhoto(input) {
      const file = input.files[0];
      if (!file || !isConnected) return;

      if (file.size > 15 * 1024 * 1024) {
        addSystemMessage('❌ Image too large (max 15MB)');
        input.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        safeEmit('photo', { dataUrl: e.target.result });
        addImageMessage(e.target.result, 'me');
        saveMessageToHistory({ type: 'image', content: e.target.result, sender: 'me', timestamp: Date.now() });
      };
      reader.readAsDataURL(file);
      input.value = '';
    }



    function nextPartner() {
      console.log('Transitioning to next partner...');
      
      isConnected = false;
      partnerId = null;
      
      // Clear UI
      document.getElementById('messagesArea').innerHTML = '';
      document.getElementById('partnerName').textContent = 'Finding partner...';
      document.getElementById('partnerDetails').style.display = 'none';
      document.getElementById('premiumBadge').style.display = 'none';
      
      safeEmit('next');
      addSystemMessage('🔍 Looking for a new partner...');
      document.getElementById('matchingOverlay').classList.add('show');
    }


    function reportPartner() {
      if (confirm('⚠️ Report this user for inappropriate behavior?\nThey will be blocked permanently.')) {
        safeEmit('report-partner');
        addSystemMessage('🚫 User reported and blocked');
      }
    }

    function blockPartner() {
      if (confirm('🚫 Block this user?\nYou will not be matched with them again.')) {
        safeEmit('block-partner');
        addSystemMessage('🚫 User blocked');
      }
    }

    // Premium functions
    function openPremiumModal() {
      document.getElementById('premiumModal').classList.add('show');
    }

    function closePremiumModal() {
      document.getElementById('premiumModal').classList.remove('show');
    }

    function selectPremiumFilter(filter) {
      premiumFilter = filter;
      document.getElementById('premiumMaleOption').classList.remove('selected');
      document.getElementById('premiumFemaleOption').classList.remove('selected');
      if (filter === 'male') {
        document.getElementById('premiumMaleOption').classList.add('selected');
      } else if (filter === 'female') {
        document.getElementById('premiumFemaleOption').classList.add('selected');
      }
    }

    function activatePremium() {
      if (!premiumFilter) {
        alert('Please select a gender preference');
        return;
      }

      isPremium = true;
      closePremiumModal();

      // Start premium timer (15 minutes = 900000 ms)
      if (premiumTimer) clearInterval(premiumTimer);
      premiumEndTime = Date.now() + 15 * 60 * 1000;

      premiumTimer = setInterval(() => {
        const remaining = premiumEndTime - Date.now();
        if (remaining <= 0) {
          clearInterval(premiumTimer);
          isPremium = false;
          premiumFilter = null;
          addSystemMessage('⭐ Premium time expired. Upgrade again to continue!');
          document.getElementById('statusText').textContent = 'Connected';
        } else {
          const minutes = Math.floor(remaining / 60000);
          const seconds = Math.floor((remaining % 60000) / 1000);
          document.getElementById('statusText').textContent = `Premium ${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
      }, 1000);

      addSystemMessage(`⭐ Premium activated! You'll only chat with ${premiumFilter}s for 15 minutes`);

      // Restart matching to apply premium filter
      if (isConnected) {
        nextPartner();
      } else {
        startMatching();
      }
    }

    // UI helper functions
    function addMessage(text, type, opts = {}) {
      const messagesArea = document.getElementById('messagesArea');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      if (opts.id) div.dataset.msgId = opts.id;

      // Add click to reply
      div.onclick = () => setReplyTo(opts.id || newMessageId(), text, type === 'me');

      let replyHtml = '';
      if (opts.reply) {
        replyHtml = `
          <div class="message-reply-quote">
            <div style="font-weight:700;font-size:10px;margin-bottom:2px;">${opts.reply.text.length > 50 ? opts.reply.text.substring(0, 50) + '...' : opts.reply.text}</div>
          </div>
        `;
      }

      if (type === 'me') {
        div.innerHTML = `
          ${replyHtml}
          <div style="display:flex;gap:10px;align-items:flex-end;justify-content:space-between;">
            <span>${text}</span>
          </div>
        `;
      } else {
        div.innerHTML = `
          ${replyHtml}
          <div>${text}</div>
        `;
      }
      messagesArea.appendChild(div);
      while (messagesArea.children.length > 120) {
        messagesArea.removeChild(messagesArea.firstChild);
      }
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }


    function addImageMessage(dataUrl, type) {
      const messagesArea = document.getElementById('messagesArea');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      const img = document.createElement('img');
      img.src = dataUrl;
      img.style.maxWidth = '100%';
      img.style.borderRadius = '12px';
      img.style.marginTop = '4px';
      img.onclick = () => window.open(dataUrl, '_blank');
      div.appendChild(img);
      messagesArea.appendChild(div);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function addSystemMessage(text) {
      const messagesArea = document.getElementById('messagesArea');
      const div = document.createElement('div');
      div.className = 'message system';
      div.innerHTML = text;
      messagesArea.appendChild(div);
      while (messagesArea.children.length > 120) {
        messagesArea.removeChild(messagesArea.firstChild);
      }
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function startMemoryMonitor() {
      if (memoryMonitorTimer) clearInterval(memoryMonitorTimer);
      memoryMonitorTimer = setInterval(() => {
        try {
          const used = performance?.memory?.usedJSHeapSize || 0;
          if (!used) return;
          const over = used > 200 * 1024 * 1024;
          if (over && !memoryHighSince) memoryHighSince = Date.now();
          if (!over) memoryHighSince = null;
          if (memoryHighSince && Date.now() - memoryHighSince > 5 * 60 * 1000) {
            addSystemMessage('Memory usage is high. Running cleanup...');
            flushPendingMessages();
            while (document.getElementById('messagesArea').children.length > 80) {
              document.getElementById('messagesArea').removeChild(document.getElementById('messagesArea').firstChild);
            }
            memoryHighSince = null;
          }
        } catch (e) {
          console.warn('Memory monitor error:', e);
        }
      }, 15000);
    }

    // Initialize
    (async () => {
      showModeIndicator();
      try { messageDb = await initMessageDb(); } catch (e) { console.warn('IndexedDB init failed:', e); }
      loadMessageHistory();
      const dbMsgs = await loadMessagesFromIndexedDb();
      if (!messageHistory.length && dbMsgs.length) {
        dbMsgs.slice(-100).forEach((msg) => {
          if (msg.type === 'text') addMessage(msg.content || msg.text || '', msg.sender || 'them');
        });
      }
      setConnectionState('connecting');
      startMemoryMonitor();
      socket.connect();
    })();

    function cleanupAll() {
      try { stopHeartbeat(); } catch (_) {}
      try {
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = null;
      } catch (_) {}
      try {
        if (typingDebounceTimer) clearTimeout(typingDebounceTimer);
        if (typingStopTimer) clearTimeout(typingStopTimer);
        if (remoteTypingClearTimer) clearTimeout(remoteTypingClearTimer);
      } catch (_) {}
      try { setLoading(false); } catch (_) {}
      try { if (memoryMonitorTimer) clearInterval(memoryMonitorTimer); memoryMonitorTimer = null; } catch (_) {}


      // Disconnect socket to avoid background work
      try { socket.disconnect(); } catch (_) {}
    }

    // Save state before page unload
    window.addEventListener('beforeunload', () => {
      cleanupAll();
      if (premiumTimer) {
        clearInterval(premiumTimer);
      }

      // Save current state
      if (isConnected && currentPartner) {
        sessionStorage.setItem('currentPartner', JSON.stringify(currentPartner));
      }
      localStorage.setItem(MESSAGE_HISTORY_KEY, JSON.stringify(messageHistory));
    });

    // Handle page visibility change
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        console.log('Page hidden, preserving state');
      } else {
        console.log('Page visible, reconnecting if needed');
        if (!socket.connected) {
          setConnectionState('connecting');
          socket.connect();
        }
      }
    });

    // Handle online/offline
    window.addEventListener('online', () => {
      addSystemMessage('You’re back online.');
      if (!socket.connected) {
        setConnectionState('connecting');
        socket.connect();
      }
    });

    window.addEventListener('offline', () => {
      addSystemMessage('You’re offline. We’ll reconnect when you’re back.');
    });

    console.log('Chat initialized - Mode:', setup.mode, 'Anonymous ID:', anonymousId);
  </script>
