<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ChatRoom — Connect Anonymously</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #8b5cf6;
      --primary-dark: #7c3aed;
      --secondary: #ec4899;
      --accent: #10b981;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.8);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.1);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow-x: hidden;
      line-height: 1.4;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .bg-blobs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, var(--surface) 0%, var(--bg) 100%);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--accent);
      filter: blur(60px);
      border-radius: 50%;
      opacity: 0.1;
      animation: move 20s infinite alternate ease-in-out;
    }

    .blob-1 {
      top: -50px;
      left: -50px;
    }

    .blob-2 {
      bottom: -50px;
      right: -50px;
    }

    @keyframes move {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(30px, 60px) scale(1.05);
      }
    }

    .container {
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      transition: all 0.3s ease;
    }

    /* Header styles */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      padding: 0 12px 0 0;
      height: 60px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .logo-side {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mini {
      width: 42px;
      height: 42px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
    }

    .title-area h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }

    .title-area p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .stats-pill {
      background: var(--surface2);
      padding: 6px 12px;
      border-radius: 30px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .online-indicator {
      width: 6px;
      height: 6px;
      background: var(--accent-solid, #10b981);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-solid, #10b981);
      animation: blink 2s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* Mode Toggle */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface2);
      padding: 4px;
      border-radius: 14px;
      margin-bottom: 20px;
    }

    .mode-btn {
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      font-size: 13px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .mode-btn.active {
      background: var(--accent-solid, #8b5cf6);
      color: white;
    }

    /* Form styles */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .span-2 {
      grid-column: span 2;
    }

    .form-group {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-box {
      position: relative;
    }

    .input-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
    }

    input[type="text"],
    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px 10px 36px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent-solid, #8b5cf6);
      background: var(--surface);
    }

    /* Selector styles */
    .selector-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
    }

    .selector-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px 8px;
      border-radius: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .selector-item.active {
      background: rgba(139, 92, 246, 0.15);
      border-color: var(--accent-solid, #8b5cf6);
      color: var(--text);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
    }

    .selector-item span {
      margin-right: 4px;
    }

    /* Premium Box */
    .premium-box {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(239, 68, 68, 0.1));
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .premium-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .premium-header span {
      font-size: 11px;
      font-weight: 800;
      color: #f59e0b;
    }

    .premium-price {
      font-size: 10px;
      opacity: 0.8;
    }

    /* Footer */
    .footer-row {
      display: flex;
      align-items: stretch;
      gap: 12px;
      margin-top: 8px;
    }

    .loc-tag {
      flex: 1;
      background: var(--surface2);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .start-btn {
      flex: 1.5;
      padding: 12px 20px;
      background: var(--accent-solid, #8b5cf6);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .glass-card {
        padding: 20px 18px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .span-2 {
        grid-column: auto;
      }

      .footer-row {
        flex-direction: row; /* Keep them in a row even on mobile if possible, or adjust */
        flex-wrap: wrap;
      }

      .loc-tag {
        flex: 1;
        min-width: 120px;
      }

      .start-btn {
        flex: 2;
        min-width: 200px;
      }
    }

    @media (max-width: 480px) {
      .form-grid {
        gap: 10px;
      }

      .glass-card {
        padding: 20px 16px;
      }

      .header {
        margin-bottom: 16px;
      }

      .selector-item {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="container">
    <div class="glass-card">
      <div class="header" style="display: flex; align-items: center; gap: 12px;">
      <button class="menu-btn" onclick="window.ChatroomTheme?.toggleMenu?.(event)">
        <i class="fas fa-bars"></i>
      </button>
      <div class="logo-side" style="display: flex; align-items: center; gap: 10px; flex: 1;">
          <div class="logo-mini">💬</div>
          <div class="title-area">
            <h1>ChatRoom</h1>
            <p>Connect with the world</p>
          </div>
        </div>
        <div class="stats-pill">
          <div class="online-indicator"></div>
          <span id="onlineCount">0</span> Online
        </div>
      </div>


      <div
        style="background: var(--surface2); border-radius: 12px; padding: 12px; margin-bottom: 20px; border-left: 3px solid var(--accent-solid);">
        <p style="font-size: 12px; color: var(--muted);">
          <i class="fas fa-info-circle"></i>
          <span id="modeDescription">Chat with strangers anonymously via text messages</span>
        </p>
      </div>

      <form id="setupForm">
        <div class="form-grid">
          <div class="form-group">
            <label>NICKNAME</label>
            <div class="input-box">
              <input type="text" id="nickname" placeholder="Enter name..." maxlength="15" required autocomplete="off">
              <i class="fas fa-user"></i>
            </div>
          </div>

          <div class="form-group">
            <label>CHAT WITH</label>
            <div class="input-box">
              <select id="preference">
                <option value="anyone">Everyone</option>
                <option value="male">Men</option>
                <option value="female">Women</option>
              </select>
              <i class="fas fa-venus-mars"></i>
            </div>
          </div>

          <div class="form-group span-2">
            <label>I AM A</label>
            <div class="selector-row">
              <div class="selector-item active" id="gender-male" onclick="setGender('male')"><span>👨</span>Male</div>
              <div class="selector-item" id="gender-female" onclick="setGender('female')"><span>👩</span>Female</div>
              <div class="selector-item" id="gender-other" onclick="setGender('other')"><span>🌈</span>Other</div>
            </div>
          </div>

          <div class="form-group span-2">
            <label>MY AGE GROUP</label>
            <div class="selector-row">
              <div class="selector-item" id="age-18-" onclick="setAge('18-')"><span>👶</span>&lt;18</div>
              <div class="selector-item active" id="age-18-25" onclick="setAge('18-25')"><span>⚡</span>18-25</div>
              <div class="selector-item" id="age-25-35" onclick="setAge('25-35')"><span>🚀</span>25-35</div>
              <div class="selector-item" id="age-35+" onclick="setAge('35+')"><span>👑</span>35+</div>
            </div>
          </div>
        </div>

        <div class="footer-row">
            <div class="loc-tag" id="locationInfo">
              <i class="fas fa-location-dot"></i>
              <span id="countryLabel">Detecting...</span>
            </div>

            <button type="submit" class="start-btn">
              <span>START CHATTING</span>
              <i class="fas fa-arrow-right"></i>
            </button>
          </div>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="theme.js"></script>
  <script>
    const socket = io();
    let selectedGender = 'male';
    let selectedAge = '18-25';
    let selectedMode = 'text';
    let userCountry = { code: '🌍', name: 'Unknown' };
    let anonymousId = null;

    // Socket event handlers
    socket.on('connect', () => {
      console.log('Connected to server');
    });

    socket.on('session', (data) => {
      anonymousId = data.anonymousId;
      localStorage.setItem('anonymousId', anonymousId);
      // Load saved preferences if any
      loadSavedPreferences();
    });

    socket.on('online-count', (count) => {
      document.getElementById('onlineCount').textContent = count;
    });

    // Load saved preferences from localStorage
    function loadSavedPreferences() {
      const saved = localStorage.getItem('chatroom_preferences');
      if (saved) {
        try {
          const prefs = JSON.parse(saved);
          if (prefs.nickname) document.getElementById('nickname').value = prefs.nickname;
          if (prefs.gender) setGender(prefs.gender);
          if (prefs.pref) document.getElementById('preference').value = prefs.pref;
          if (prefs.age) setAge(prefs.age);
        } catch (e) {
          console.error('Failed to load preferences:', e);
        }
      }
    }

    // Save preferences to localStorage
    function savePreferences() {
      const prefs = {
        nickname: document.getElementById('nickname').value.trim(),
        gender: selectedGender,
        pref: document.getElementById('preference').value,
        age: selectedAge,
        mode: 'text'
      };
      localStorage.setItem('chatroom_preferences', JSON.stringify(prefs));
    }

    async function detectCountry() {
      try {
        const label = document.getElementById('countryLabel');
        if (label) label.textContent = 'Detecting…';
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        userCountry = {
          code: getCountryFlag(data.country_code),
          name: data.country_name || 'Unknown',
          code_raw: data.country_code
        };
        localStorage.setItem('user_country', JSON.stringify(userCountry));
        document.getElementById('countryLabel').textContent = `${userCountry.code} ${userCountry.name}`;
      } catch (e) {
        document.getElementById('countryLabel').textContent = "🌍 Global";
        userCountry = { code: '🌍', name: 'Global', code_raw: null };
        localStorage.setItem('user_country', JSON.stringify(userCountry));
      }
    }

    function getCountryFlag(c) {
      const flags = {
        'US': '🇺🇸', 'GB': '🇬🇧', 'IN': '🇮🇳', 'CA': '🇨🇦', 'AU': '🇦🇺',
        'DE': '🇩🇪', 'FR': '🇫🇷', 'JP': '🇯🇵', 'CN': '🇨🇳', 'BR': '🇧🇷',
        'RU': '🇷🇺', 'ZA': '🇿🇦', 'NG': '🇳🇬', 'PK': '🇵🇰', 'BD': '🇧🇩'
      };
      return flags[c] || '🌍';
    }

    function setGender(g) {
      selectedGender = g;
      document.querySelectorAll('[id^="gender-"]').forEach(b => b.classList.remove('active'));
      document.getElementById('gender-' + g).classList.add('active');
    }

    function setAge(a) {
      selectedAge = a;
      document.querySelectorAll('[id^="age-"]').forEach(b => b.classList.remove('active'));
      document.getElementById('age-' + a).classList.add('active');
    }


    document.getElementById('setupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.querySelector('.start-btn');
      if (btn) {
        btn.disabled = true;
        btn.style.opacity = '0.8';
        btn.innerHTML = `<span>Starting…</span> <i class="fas fa-spinner fa-spin"></i>`;
      }
      const nickname = document.getElementById('nickname').value.trim();
      if (!nickname) {
        alert('Please enter a name to continue.');
        if (btn) {
          btn.disabled = false;
          btn.style.opacity = '';
          btn.innerHTML = `<span>START CHATTING</span><i class="fas fa-arrow-right"></i>`;
        }
        return;
      }

      // Save preferences
      savePreferences();

      const setup = {
        nickname,
        gender: selectedGender,
        pref: document.getElementById('preference').value,
        age: selectedAge,
        mode: 'text',
        country: userCountry,
        anonymousId: anonymousId
      };

      sessionStorage.setItem('chatSetup', JSON.stringify(setup));
      window.location.href = '/chat';
    });

    // Auto-detect country on load
    detectCountry();

    // Handle page refresh - maintain state
    window.addEventListener('beforeunload', () => {
      savePreferences();
    });
  </script>
</body>

</html>
