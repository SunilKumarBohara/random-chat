<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RandomChat — Meet Strangers</title>
  <meta name="description" content="Connect with random strangers anonymously. Interest-based matching, real-time chat, modern design.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <!-- LANDING PAGE -->
    <div id="landing" class="landing">
      <div class="landing-container">
        <div class="landing-header">
          <div class="landing-title">RandomChat</div>
          <div class="landing-subtitle">Connect with strangers anonymously</div>
        </div>

        <form id="startForm">
          <div class="form-group">
            <label class="form-label">Your Name (Optional)</label>
            <input 
              type="text" 
              id="userName" 
              placeholder="Enter your name or stay anonymous"
              maxlength="50"
            >
            <div class="form-hint">Leave blank to be completely anonymous</div>
          </div>

          <div class="form-group">
            <label class="form-label">Your Interests</label>
            <textarea 
              id="interests" 
              placeholder="e.g., music, gaming, anime, travel, coding"
            ></textarea>
            <div id="interestTags" class="interests-tags"></div>
            <div class="form-hint">Separate with commas. Leave blank to match with anyone</div>
          </div>

          <button type="submit" class="btn-primary">Start Chatting</button>
        </form>
      </div>
    </div>

    <!-- CHAT CONTAINER -->
    <div id="chatContainer" class="chat-container hidden">
      <!-- Header Bar -->
      <div class="header-bar">
        <div class="status-section">
          <div class="status-indicator looking" id="statusIndicator"></div>
          <div class="status-text" id="statusText">Looking for stranger...</div>
        </div>
        <div class="app-name">RandomChat</div>
        <div class="header-actions">
          <button id="nextBtn" class="btn-outlined btn-next" title="Skip to next stranger">
            → Next
          </button>
          <button id="stopBtn" class="btn-outlined btn-stop" title="Stop chatting">
            ✕ Stop
          </button>
        </div>
      </div>

      <!-- Shared Interests Badge -->
      <div id="sharedInterestsBadge" class="shared-interests-badge hidden">
        <div class="interest-pill" id="interestPillText"></div>
      </div>

      <!-- Messages Area -->
      <div class="messages" id="messagesArea"></div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="messageInput"
            placeholder="Type a message... (Press Enter to send)"
            rows="1"
          ></textarea>
        </div>
        <button id="sendBtn" class="btn-send" title="Send message" aria-label="Send">→</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
